<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Staff Portal | CityCare</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen">
    <nav class="bg-blue-900 text-white p-4 px-10 flex justify-between">
        <h1 class="font-bold">Staff Dashboard</h1>
        <a href="/" class="text-sm opacity-80">Back to Site</a>
    </nav>

    <div class="max-w-6xl mx-auto p-10">
        <div class="bg-white shadow-xl rounded-xl overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-slate-50 border-b">
                    <tr>
                        <th class="p-4">Patient Details</th>
                        <th class="p-4">Department</th>
                        <th class="p-4">Assigned Doctor</th>
                        <th class="p-4">Date</th>
                        <th class="p-4 text-center">Actions</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        function fetchAppointments() {
            fetch('/api/appointments')
                .then(res => res.json())
                .then(data => {
                    const tbody = document.getElementById('table-body');
                    if (data.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="5" class="p-10 text-center text-gray-400">No appointments found.</td></tr>';
                        return;
                    }
                    tbody.innerHTML = data.map((appt, index) => `
                        <tr class="border-b hover:bg-slate-50 transition">
                            <td class="p-4">
                                <div class="font-bold">${appt.name}</div>
                                <div class="text-xs text-gray-400">${appt.email}</div>
                            </td>
                            <td class="p-4 text-sm">${appt.department}</td>
                            <td class="p-4 text-sm font-semibold text-blue-600">${appt.doctor || 'Pending'}</td>
                            <td class="p-4 text-sm">${appt.date}</td>
                            <td class="p-4 text-center space-x-3">
                                <button onclick="editDoctor(${index})" class="text-blue-500 hover:underline font-medium">Edit Doctor</button>
                                <button onclick="deleteAppt(${index})" class="text-red-500 hover:underline font-medium">Delete</button>
                            </td>
                        </tr>
                    `).join('');
                });
        }

        function deleteAppt(index) {
            if(confirm("Delete this appointment?")) {
                fetch(\`/api/appointments/\${index}\`, { method: 'DELETE' })
                .then(() => fetchAppointments());
            }
        }

        function editDoctor(index) {
            const docName = prompt("Assign Doctor Name:");
            if(docName) {
                fetch(\`/api/appointments/\${index}\`, {
                    method: 'PUT',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ doctor: docName })
                }).then(() => fetchAppointments());
            }
        }

        // Initial load
        fetchAppointments();
    </script>
</body>
</html>
