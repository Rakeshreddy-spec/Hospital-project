<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Login</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #0b6fa4, #5bbbe5);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 300px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #0b6fa4;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #095b85;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Admin Login</h2>

    <input type="text" id="user" placeholder="Username">
    <input type="password" id="pass" placeholder="Password">

    <button onclick="login()">Login</button>
</div>

<script>
    console.log("Login script loaded"); 
function login() {

    const username = document.getElementById("user").value;
    const password = document.getElementById("pass").value;

    fetch("https://hospital-project-krnn.onrender.com/login", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ username, password })
    })
    .then(res => res.json())
    .then(data => {

        console.log("Login Response:", data);

        if(data.success){

    alert("Login Success"); // 🔥 confirm click

    localStorage.setItem("loggedIn", "true");

    console.log("Stored:", localStorage.getItem("loggedIn")); // 🔥 check

    window.location.href = "admin.html";
}else {
            alert("Invalid login");
        }

    })
    .catch(err => console.error(err));
}
</script>

</body>
</html>
