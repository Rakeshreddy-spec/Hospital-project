<!DOCTYPE html>
<html>
<head>
  <title>SmartCare Hospital</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f6f8;
      padding: 20px;
    }
    h1 {
      color: #2c3e50;
    }
    form {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
    }
    input, button {
      padding: 10px;
      margin: 5px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: center;
    }
    button {
      background: #3498db;
      color: white;
      border: none;
      cursor: pointer;
    }
    .delete {
      background: red;
    }
  </style>
</head>
<body>

<h1>🏥 SmartCare Hospital</h1>

<form id="form">
  <input type="text" id="name" placeholder="Patient Name" required>
  <input type="email" id="email" placeholder="Email" required>
  <input type="date" id="date" required>
  <button type="submit">Add Appointment</button>
</form>

<h2>Appointments</h2>
<table>
  <thead>
    <tr>
      <th>Name</th>
      <th>Email</th>
      <th>Date</th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>

<script>
const API = "https://hospital-project-krnn.onrender.com";

// Load data
async function loadData() {
  const res = await fetch(API + "/appointments");
  const data = await res.json();

  const table = document.getElementById("tableBody");
  table.innerHTML = "";

  data.forEach(item => {
    table.innerHTML += `
      <tr>
        <td>${item.name}</td>
        <td>${item.email}</td>
        <td>${item.date}</td>
        <td>
          <button class="delete" onclick="deleteData('${item._id}')">Delete</button>
        </td>
      </tr>
    `;
  });
}

// Add data
document.getElementById("form").addEventListener("submit", async (e) => {
  e.preventDefault();

  const data = {
    name: document.getElementById("name").value,
    email: document.getElementById("email").value,
    date: document.getElementById("date").value
  };

  await fetch(API + "/appointments", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(data)
  });

  loadData();
});

// Delete data
async function deleteData(id) {
  await fetch(API + "/appointments/" + id, {
    method: "DELETE"
  });
  loadData();
}

loadData();
</script>

</body>
</html>
