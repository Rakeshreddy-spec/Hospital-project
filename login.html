<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CityCare</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/style.css">
</head>
<body class="bg-slate-100 flex items-center justify-center h-screen">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md animate-fade">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold text-gray-800">Hospital Portal</h2>
            <p class="text-gray-500">Authorized Personnel Only</p>
        </div>
        <form action="/login" method="POST" class="space-y-6">
            <div>
                <label class="block text-sm font-semibold mb-2">Employee ID</label>
                <input type="text" name="username" required class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-semibold mb-2">Password</label>
                <input type="password" name="password" required class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition">Sign In</button>
        </form>
        <p class="text-center mt-6 text-sm text-gray-400">&copy; 2026 CityCare Systems</p>
    </div>
</body>
</html>
