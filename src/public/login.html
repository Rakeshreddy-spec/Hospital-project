<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Login | CityCare Hospital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen">

    <div class="bg-white p-10 rounded-2xl shadow-2xl w-full max-w-md transform transition-all hover:scale-[1.01]">
        <!-- Logo Section -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-100 rounded-full mb-4">
                <i class="fas fa-user-md text-blue-600 text-3xl"></i>
            </div>
            <h1 class="text-3xl font-extrabold text-slate-800">Staff Portal</h1>
            <p class="text-slate-500 mt-2">Please enter your credentials to manage appointments</p>
        </div>

        <!-- Login Form -->
        <!-- CRITICAL: action="/login" matches the app.post('/login') in server.js -->
        <form action="/login" method="POST" class="space-y-6">
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">Username</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                        <i class="fas fa-user"></i>
                    </span>
                    <input type="text" name="username" required 
                           class="block w-full pl-10 pr-3 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition shadow-sm" 
                           placeholder="e.g. admin">
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">Password</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                        <i class="fas fa-lock"></i>
                    </span>
                    <input type="password" name="password" required 
                           class="block w-full pl-10 pr-3 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition shadow-sm" 
                           placeholder="••••••••">
                </div>
            </div>

            <div class="flex items-center justify-between text-sm">
                <label class="flex items-center text-slate-600">
                    <input type="checkbox" class="rounded border-gray-300 text-blue-600 mr-2"> Remember me
                </label>
                <a href="#" class="text-blue-600 hover:underline font-medium">Forgot Password?</a>
            </div>

            <button type="submit" 
                    class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold text-lg hover:bg-blue-700 active:bg-blue-800 transition-all shadow-lg hover:shadow-blue-500/30">
                Sign In
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-slate-100 text-center">
            <a href="/" class="text-slate-500 hover:text-blue-600 transition flex items-center justify-center space-x-2">
                <i class="fas fa-arrow-left text-xs"></i>
                <span>Back to Main Website</span>
            </a>
        </div>
    </div>

    <!-- Security Note -->
    <p class="absolute bottom-6 text-slate-500 text-xs text-center w-full px-4">
        Authorized Access Only. All activities are monitored for security purposes.
    </p>

</body>
</html>
