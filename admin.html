<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/style.css">
</head>
<body class="bg-gray-100 min-h-screen">
    <nav class="bg-slate-900 text-white p-4 shadow-lg flex justify-between px-10">
        <h1 class="text-xl font-bold">🏥 CityCare Admin</h1>
        <a href="/" class="opacity-70 hover:opacity-100">Logout</a>
    </nav>

    <div class="max-w-6xl mx-auto p-8">
        <h2 class="text-3xl font-bold mb-8 text-gray-800">Incoming Appointments</h2>
        
        <div class="bg-white rounded-2xl shadow-sm overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-gray-50">
                    <tr class="text-gray-600 uppercase text-xs font-bold">
                        <th class="p-4">Patient Name</th>
                        <th class="p-4">Email</th>
                        <th class="p-4">Date</th>
                        <th class="p-4">Department</th>
                    </tr>
                </thead>
                <tbody id="appointment-list" class="divide-y divide-gray-100">
                    <!-- Data will appear here -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Fetch appointments from our server
        fetch('/api/appointments')
            .then(res => res.json())
            .then(data => {
                const list = document.getElementById('appointment-list');
                list.innerHTML = data.map(appt => `
                    <tr class="hover:bg-blue-50 transition">
                        <td class="p-4 font-semibold text-gray-700">${appt.name}</td>
                        <td class="p-4 text-gray-500">${appt.email}</td>
                        <td class="p-4 font-mono text-sm">${appt.date}</td>
                        <td class="p-4"><span class="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-xs font-bold">${appt.dept}</span></td>
                    </tr>
                `).join('');
            });
    </script>
</body>
</html>
