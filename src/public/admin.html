<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Staff Portal | Case Study Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen">
    <nav class="bg-blue-900 text-white p-4 px-10 flex justify-between shadow-lg">
        <h1 class="font-bold text-xl">🏥 Hospital AI Node - Staff Portal</h1>
        <a href="/" class="hover:underline text-sm opacity-80">Logout</a>
    </nav>

    <div class="max-w-6xl mx-auto p-8">
        <div class="mb-6 bg-blue-100 border-l-4 border-blue-500 text-blue-700 p-4" role="alert">
            <p class="font-bold">Federated Learning Status:</p>
            <p>This node is currently collecting local patient data for global model training.</p>
        </div>

        <div class="bg-white rounded-xl shadow-md border overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-gray-50 border-b">
                    <tr class="text-gray-500 text-xs font-bold uppercase">
                        <th class="p-5">Patient Name</th>
                        <th class="p-5">Department (Label)</th>
                        <th class="p-5">Assigned Doctor</th>
                        <th class="p-5">Date</th>
                    </tr>
                </thead>
                <tbody id="appt-table">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        async function loadData() {
            try {
                const res = await fetch('/api/appointments');
                const data = await res.json();
                const tbody = document.getElementById('appt-table');
                
                if (data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" class="p-10 text-center text-gray-400">No data found. Please book an appointment first.</td></tr>';
                    return;
                }

                tbody.innerHTML = data.map(appt => {
                    // Check if data is poisoned for visual effect
                    const isPoisoned = appt.department.includes("POISONED");
                    return `
                    <tr class="border-b ${isPoisoned ? 'bg-red-50' : 'hover:bg-blue-50'} transition">
                        <td class="p-5 font-medium">${appt.name}</td>
                        <td class="p-5">
                            <span class="${isPoisoned ? 'text-red-600 font-bold animate-pulse' : 'text-gray-700'}">
                                ${appt.department}
                            </span>
                        </td>
                        <td class="p-5">${appt.doctor}</td>
                        <td class="p-5 text-gray-500 text-sm">${appt.date}</td>
                    </tr>
                `}).join('');
            } catch (err) {
                console.error("Fetch error:", err);
            }
        }

        // Auto-refresh every 3 seconds to show the attack happening live
        setInterval(loadData, 3000);
        loadData();
    </script>
</body>
</html>
