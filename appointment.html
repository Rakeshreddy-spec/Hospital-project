<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Appointment | CityCare</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/style.css">
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6">
    <div class="bg-white max-w-2xl w-full rounded-2xl shadow-2xl overflow-hidden flex flex-col md:flex-row">
        <div class="md:w-1/3 bg-blue-600 p-8 text-white flex flex-col justify-center">
            <h2 class="text-3xl font-bold mb-4">Book Now</h2>
            <p class="opacity-80">Skip the queue and schedule your visit with our specialists in seconds.</p>
        </div>
        <form action="/submit-appointment" method="POST" class="md:w-2/3 p-8 space-y-4">
            <div>
                <label class="block text-sm font-bold text-gray-700">Full Name</label>
                <input type="text" name="name" required class="w-full mt-1 p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700">Email Address</label>
                <input type="email" name="email" required class="w-full mt-1 p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-bold text-gray-700">Date</label>
                    <input type="date" name="date" required class="w-full mt-1 p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700">Department</label>
                    <select name="department" class="w-full mt-1 p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                        <option>Cardiology</option>
                        <option>Neurology</option>
                        <option>Pediatrics</option>
                        <option>General Surgery</option>
                    </select>
                </div>
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-700 transition transform hover:scale-[1.01]">
                Confirm Appointment
            </button>
            <a href="/" class="block text-center text-sm text-gray-500 hover:text-blue-600 mt-4">Cancel and Return</a>
        </form>
    </div>
</body>
</html>
